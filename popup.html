<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Nearby Airports</title>
    <style>
body {
  margin: 0;
  padding: 16px;
  background: #0b1220;
  color: #e5e7eb;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  box-sizing: border-box;
  position: relative;
  overflow: visible;
}

#airportSuggestions {
  min-width: 220px;
}

body {
  background: #0b1220 !important;
}

html, body {
  height: 100%;
}

body {
  display: flex;
  flex-direction: column;
}
  .row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
  align-items: center;
}

  label {
  font-size: 11px;
  margin-bottom: 2px;
  opacity: 0.75;
}

  input:not([type="checkbox"]),
select {
  width: 100%;
  box-sizing: border-box;
  background: #1b1f26;
  border: 1px solid #2b313c;
  color: #e6e8eb;
  padding: 6px 8px;
  font-size: 12px;
  border-radius: 6px;
}

input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: #ec4899; /* keeps your pink check */
  cursor: pointer;
}

  input:focus, select:focus {
    outline: none;
    border-color: #4c8dff;
  }

button:not(#popupClose){
  padding: 8px 10px;
  cursor: pointer;
  background: linear-gradient(135deg, #2f6bff, #1e4ed8);
  border: none;
  color: white;
  border-radius: 8px;
  font-weight: 600;
  transition: 0.15s ease;
  font-size: 13px;
}

  button:hover { filter: brightness(1.1); }

  .small {
  font-size: 10px;
  color: #6b7280;
  line-height: 1.2;
  opacity: 0.7;
}

  .status {
    font-size: 11px;
    margin: 6px 0;
    color: #9aa4b2;
  }

  .error { color: #ff5c5c; }


#results {
  padding-bottom: 8px;
}
  /* 🔥 Airport cards */
.card {
  background: linear-gradient(145deg, #111827, #0f172a);
  border-radius: 16px;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.45);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(0,0,0,0.55);
}

.card.copied {
  background: rgba(34, 197, 94, 0.15);
  transition: background 0.15s ease;
}

  .title {
  font-weight: 700;
  font-size: 18px;
}

.sub {
  opacity: 0.7;
  margin-top: 4px;
}

  .sub {
    font-size: 12px;
    color: #9aa4b2;
    margin-top: 3px;
  }

  .rwys, .proc {
    font-size: 12px;
    margin-top: 8px;
    line-height: 1.4;
    white-space: pre-wrap;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  hr {
  border: none;
  border-top: 1px solid #242933;
  margin: 2px 0;
}

  /* Section headers */
  .section-title {
    margin-top: 12px;
    font-weight: 700;
    font-size: 13px;
    color: #4c8dff;
  }

  /* Section panels */
  .section-panel {
    margin-top: 6px;
    padding: 8px;
    border-radius: 10px;
    background: #11141a;
    border: 1px solid #232834;
  }

  /* Runway selector row */
  .rwy-selector {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 6px 0 10px 0;
  }

  /* Runway blocks */
  .rwy-block {
    background: #0f131a;
    border: 1px solid #262c37;
    border-radius: 12px;
    padding: 10px;
    margin-top: 10px;
  }

  .rwy-header {
    font-weight: 600;
    font-size: 12px;
    color: #cdd6f4;
    margin-bottom: 6px;
  }

  /* Chips */
#mainPanel span,
#fixPopover span,
.proc span,
.rwys span,
#routeResults span {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 999px;
  margin: 4px 6px 0 0;
  font-size: 12px;
  background: #20242c;
  border: 1px solid #2e3440;
  color: #e6e8eb;
  transition: 0.15s ease;
}

#mainPanel span:hover,
#fixPopover span:hover,
.proc span:hover,
.rwys span:hover,
#routeResults span:hover {
  background: #2b3240;
  border-color: #4c8dff;
}

  /* Fix popover */
  #fixPopover {
    position: fixed;
    width: 240px;
    max-height: 260px;
    background: #161a22;
    border: 1px solid #2b313c;
    color: #e6e8eb;
    border-radius: 12px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
  }

  #fixPopover.hidden { display: none; }

  #fixPopoverHeader {
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #242933;
  }

  #fixPopoverClose {
    background: none;
    border: none;
    color: #8a93a3;
    cursor: pointer;
    font-size: 14px;
  }

  #fixPopoverClose:hover { color: #ffffff; }

  #fixPopoverContent {
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.4;
    white-space: pre;
    overflow-y: auto;
    flex: 1;
  }

  #fixPopoverContent::-webkit-scrollbar {
    width: 6px;
  }

  #fixPopoverContent::-webkit-scrollbar-thumb {
    background: #3b4352;
    border-radius: 3px;
  }
  
* {
  box-sizing: border-box;
}

#mainPanel,
#sidePanel {
  overflow-x: hidden;
}

/* PANEL */
/* ===== Layout ===== */

#layout {
  flex: 1;                 /* take remaining space */
  display: flex;
  overflow: hidden;        /* important */
  gap: 8px;
  min-height: 0;           /* critical for flex scroll */
}

#mainPanel {
  flex:  1 1 auto;
  min-width: 500px;
  min-height: 0;
  overflow-y: auto;
  position:relative;
}

/* Waypoint search row matches the card inset */
#waypointSearchWrap{
  width: calc(100% - 24px) !important;   /* 12px left + 12px right */
  margin: 0 12px 10px 12px !important;   /* align with cards */
  position: sticky !important;
  top: 0;
  z-index: 5;
  background: #0b1220;                  /* so sticky doesn't look weird */
  padding-top: 6px;
}



/* Waypoint search row */
#waypointSearchWrap{
  display: flex;
  gap: 8px;
  margin: 0 12px 10px 12px;  /* match card inset */
}

/* Input */
#waypointSearch{
  flex: 1;
  height: 34px;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid #2b313c;
  background: #1b1f26;
  color: #e6e8eb;
  font-size: 12px;
}

/* Clear button */



#sidePanel {
  flex: 0 0 210px;
  width: 210px;
  max-width: 210px;
  min-width: 210px;

  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

#sidePanel {
  scrollbar-width: thin;
  scrollbar-color: rgba(120,140,180,0.10) transparent;
}

#sidePanel::-webkit-scrollbar {
  width: 4px;
}

#sidePanel::-webkit-scrollbar-track {
  background: transparent;
}

#sidePanel::-webkit-scrollbar-thumb {
  background: rgba(120,140,180,0.10);
  border-radius: 999px;
}

#sidePanel:hover::-webkit-scrollbar-thumb {
  background: rgba(120,140,180,0.24);
}

.sideItem {
  overflow: visible;
}

.sideItem .name,
.sideItem .rwys {
  white-space: normal;
  overflow: visible;
  text-overflow: clip;
  word-break: break-word;
}

#facilityPanel {
  flex: 0 0 230px;
  display: flex;
  flex-direction: column;
  min-height: 0;
}


#sideTitle {
  font-weight: 700;
  margin-bottom: 10px;
  font-size: 14px;
  color: #93c5fd;
  letter-spacing: 0.5px;
}

#sideList {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;

  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-right: 4px;
}

.sideItem {
  padding: 8px 10px;
  border-radius: 12px;
  background: #1f2937;
  cursor: pointer;
  transition: all 0.15s ease;
}

.sideItem .code {
  font-weight: 700;
  font-size: 12px;
  line-height: 1.2;
}

.sideItem .name {
  font-size: 10px;
  line-height: 1.25;
  opacity: 0.82;
  margin-top: 2px;
}

.sideItem .rwys {
  font-size: 10px;
  line-height: 1.25;
  opacity: 0.68;
  margin-top: 4px;
}

#sideList {
  scrollbar-width: thin;
  scrollbar-color: rgba(120,140,180,0.12) transparent;
}

#sideList::-webkit-scrollbar {
  width: 4px;
}

#sideList::-webkit-scrollbar-track {
  background: transparent;
}

#sideList::-webkit-scrollbar-thumb {
  background: rgba(120,140,180,0.12);
  border-radius: 999px;
}

#sideList:hover::-webkit-scrollbar-thumb {
  background: rgba(120,140,180,0.28);
}
.sideItem:hover {
  background: #334155;
}

.sideItem.active {
  background: #2563eb;
  color: white;
}

.sideItem .code {
  font-weight: 700;
  font-size: 13px;
}

.sideItem .name {
  font-size: 11px;
  opacity: 0.8;
  margin-top: 2px;
}

.sideItem .rwys {
  font-size: 10px;
  opacity: 0.6;
  margin-top: 4px;
}

#sidebar h3 {
  margin-top: 0;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: #93c5fd;
}

#facilityTitle {
  font-weight: 700;
  margin-bottom: 10px;
  font-size: 14px;
  color: #facc15;
  letter-spacing: 0.5px;
}

#facilityContent {
  flex: 1;
  min-height: 0;
overflow-y: auto;   /* 🔥 THIS IS THE FIX */
  font-size: 12px;
  line-height: 1.4;
  white-space: pre-wrap;
  color: #cbd5e1;
}

.facilityItem {
  margin-bottom: 6px;
  padding: 6px 8px;
  background: #1e293b;
  border-radius: 8px;
}




/* ===== Compact Control Bar ===== */

#controlBar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: nowrap;       /* 🔥 no wrapping */
  white-space: nowrap;
}

#controlBar input,
#controlBar select {
  height: 34px;
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
}

/* ICAO small */
.icaoInput {
  width: 120px;           /* was too small */
  text-transform: uppercase;
  font-weight: 600;
  letter-spacing: 1px;
  text-align: center;
}

/* Small number fields */
#radiusNm,
#maxResults {
  width: 55px;
}


#types {
  width: 100px;
}

/* Compact checkbox */
.checkboxCompact {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  margin-left: 4px;
}

/* Smaller search button */
.searchCompact {
  flex: 0 0 110px;   /* fixed width */
  margin-left: 8px;
}
.field {
  display: flex;
  align-items: center;
}
.smallField {
  width: auto;
}

#radiusNm,
#maxResults {
  width: 65px;
}

#types {
  width: 110px;
}

#popupClose:hover {
  background: #1f2937;
  color: white;
}


.footerNote {
  text-align: center;
  margin: 2px 0 0 0;
  font-size: 9px;
  color: #ffffff;      /* white */
  opacity: 0.75;       /* subtle but readable */
}




#lbxTitle {
  font-weight: 700;
  font-size: 14px;
  color: #f472b6;
  margin-bottom: 10px;
}

.lbxLabel {
  font-size: 10px;
  opacity: 0.6;
  margin-bottom: 4px;
}
#lbxKey {
  width: 100%;
  resize: none;
  overflow: hidden;

  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-weight: 600;
  font-size: 12px;
  line-height: 1.5;

  background: #1b1f26;
  border: 1px solid #2b313c;
  border-radius: 8px;
  padding: 8px 10px;

  color: #e6e8eb;

  min-height: 44px;
}
.lbxSpeedRow {
  display: flex;
  gap: 6px;
}

#lbxSpeedText {
  width: 70px;
}

#lbxStatus {
  font-size: 10px;
  opacity: 0.7;
  margin-top: auto;
}


/* IMPORTANT: prevent flex children from forcing layout weirdness */
#mainPanel { min-width: 0; }
#facilityPanel { flex: 0 0 230px; }

#lbxPanel > .lbxSection,
#lbxPanel > div,
#lbxPanel > label,
#lbxPanel > hr {
  flex-shrink: 0;
}

.lbxKeyRow {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}

.lbxKeyRow .lbxSubtleBtn {
  align-self: flex-end;
}


.panelToggle {
  position: absolute;
  top: 50%;
  left: -12px;
  transform: translateY(-50%);
  width: 22px;
  height: 48px;
  border-radius: 12px;
  border: 1px solid #1f2937;
  background: #111827;
  color: #9ca3af;
  font-size: 14px;
  cursor: pointer;
  z-index: 5;
}

.panelToggle:hover {
  background: #2563eb;
  color: white;
}




#lbxPanel .lbxSubtleBtn {
  background: transparent;
  border: 1px solid #2b313c;
  color: #9ca3af;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 6px;
  font-weight: 500;
  margin-bottom: 8px;
  cursor: pointer;
  width: auto;
}

#lbxPanel .lbxSubtleBtn:hover {
  background: #1f2937;
  color: #e5e7eb;
  border-color: #3b82f6;
}

#overlayRoot {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

#layout {
  flex: 1;
  display: flex;
  overflow: hidden;
  gap: 8px;
  min-height: 0;
}

/* ===== FACILITY PANEL ===== */

#facilityPanel {
  flex: 0 0 230px;
  width: 230px;
  transition: all 0.25s cubic-bezier(.4,0,.2,1);
  position: relative;
}

/* Collapsed state */
#overlayRoot:not(.facility-open) #facilityPanel {
  flex: 0 0 28px;
  width: 28px;
  padding: 0;
  cursor: pointer;
  background: linear-gradient(145deg, #111827, #0f172a);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Hide body */
#overlayRoot:not(.facility-open) #facilityPanel .panel-body {
  display: none;
}

/* Vertical label */
#overlayRoot:not(.facility-open) #facilityPanel .panel-header {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-weight: 700;
  font-size: 11px;
  color: #facc15;
  letter-spacing: 0.3px;
  text-align: center;
}


#overlayRoot:not(.airportsearch-open) #airportSearchPanel .panel-header {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-weight: 700;
  font-size: 11px;
  color: #3b82f6;
  letter-spacing: 0.3px;
  text-align: center;
}

#overlayRoot:not(.route-open) #routePanel .panel-header {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-weight: 700;
  font-size: 11px;
  color: #22c55e;
  letter-spacing: 0.3px;
  text-align: center;
}


/* Hover effect */
#overlayRoot:not(.facility-open) #facilityPanel:hover {
  background: #1f2937;
}

#overlayRoot.facility-open #facilityPanel {
  background: linear-gradient(145deg, #111827, #0f172a);
  border-radius: 16px;
  padding: 12px;
}

#overlayRoot.facility-open #facilityPanel .panel-header {
  writing-mode: horizontal-tb;
  transform: none;
  font-size: 14px;
  font-weight: 700;
  color: #facc15; /* keep your yellow accent */
  margin-bottom: 10px;
}
.panel-body {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0; /* 🔥 THIS FIXES SCROLL */
}

/* ===== LBX PANEL ===== */

#lbxPanel {
  flex: 0 0 240px;
  width: 240px;
  background: #0f172a;
  border-left: 1px solid #1f2937;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  padding: 10px;
  transition: all 0.25s cubic-bezier(.4,0,.2,1);
  overflow: visible;
  min-height: auto;
  height: auto;
}

/* Collapsed state */
#overlayRoot:not(.lbx-open) #lbxPanel {
  flex: 0 0 28px;
  width: 28px;
  padding: 0;
  cursor: pointer;
}

/* Hide content */
#overlayRoot:not(.lbx-open) #lbxPanel > *:not(#lbxTitle) {
  display: none;
}

/* Vertical title */
#overlayRoot:not(.lbx-open) #lbxTitle {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-size: 11px;
  letter-spacing: 0.3px;
}

.waypointRow {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

#waypointSearch {
  flex: 1;
  padding: 6px 8px;
  border-radius: 8px;
  border: 1px solid #2b313c;
  background: #1b1f26;
  color: #e6e8eb;
  font-size: 12px;
}

#waypointClearBtn {
  height: 34px;
  min-width: 64px;
  padding: 0 12px;

  border-radius: 8px;
  border: 1px solid #2b313c;

  background: #1f2937;
  color: #9ca3af;

  font-size: 12px;
  font-weight: 600;
  cursor: pointer;

  display: none; /* JS controls this */

  transition: all 0.15s ease;
}

#waypointClearBtn:hover {
  background: #2563eb;
  color: white;
  border-color: #2563eb;
}


/* ===== Compact Fix Popover ===== */

#fixPopover {
  width: 220px;
  max-height: 240px;
}

#fixPopoverContent {
  padding: 6px 8px;
  font-size: 11px;
}

.fixRow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 4px;
  gap: 8px;
  border-bottom: 1px solid #1f2430;
}

.fixRow:last-child {
  border-bottom: none;
}

.fixCode {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.4px;
  min-width: 52px;
}

.fixMeta {
  font-size: 10px;
  opacity: 0.75;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.fixRow.isNav .fixMeta {
  opacity: 1;
  color: #c7d2fe;
}

.fixRow.copied {
  background: rgba(37, 99, 235, 0.15);
  transition: background 0.15s ease;
}


#routePanel {
  flex: 0 0 260px;
  width: 260px;
  background: #0f172a;
  border-left: 1px solid #1f2937;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  min-height: 0;
  padding: 10px;
  transition: all 0.25s cubic-bezier(.4,0,.2,1);
}
.routeBody {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;        /* 🔥 critical */
}

#routeResults {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

/* Mode toggle */
#routeModeToggle {
  display: flex;
  gap: 4px;
  margin-bottom: 6px;
  flex-shrink: 0;
}
.routeModeBtn {
  flex: 1;
  padding: 3px 0;
  font-size: 11px;
  font-weight: 600;
  border-radius: 6px;
  border: 1px solid #2d3748;
  background: #1e293b;
  color: #94a3b8;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.routeModeBtn.active {
  background: #22c55e;
  color: #0a0a0a;
  border-color: #22c55e;
}

/* Fixes mode */
.routeBody.fixes-mode #routeFreqs { display: none; }
.routeBody.fixes-mode #routeAirports { display: none; }
.routeBody.fixes-mode #routeVfrWps { display: none; }
.routeBody.fixes-mode #routeResults { display: flex; flex: 1; }

/* Freqs mode */
.routeBody.freqs-mode #routeResults { display: none; }
.routeBody.freqs-mode #routeAirports { display: none; }
.routeBody.freqs-mode #routeVfrWps { display: none; }
.routeBody.freqs-mode #routeFreqs {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  display: block;
}

/* Airports mode */
.routeBody.airports-mode #routeResults { display: none; }
.routeBody.airports-mode #routeFreqs { display: none; }
.routeBody.airports-mode #routeVfrWps { display: none; }
.routeBody.airports-mode #routeAirports {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  display: block;
}

/* VFR WPs mode */
.routeBody.vfr-mode #routeResults { display: none; }
.routeBody.vfr-mode #routeFreqs { display: none; }
.routeBody.vfr-mode #routeAirports { display: none; }
.routeBody.vfr-mode #routeVfrWps {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

/* default hidden */
#routeAirports { display: none; }
#routeVfrWps { display: none; }

/* Collapsed */
#overlayRoot:not(.route-open) #routePanel {
  flex: 0 0 28px;
  width: 28px;
  padding: 0;
  cursor: pointer;
}

#overlayRoot:not(.route-open) #routePanel > *:not(#routeTitle) {

  min-height: 0;
  padding: 10px;
  transition: all 0.25s cubic-bezier(.4,0,.2,1);
  position: relative;
}

#overlayRoot:not(.globalnav-open) #globalNavPanel {
  flex: 0 0 28px;
  width: 28px;
  padding: 0;
  cursor: pointer;
}

#overlayRoot:not(.globalnav-open) #globalNavPanel > *:not(#globalNavTitle) {
  display: none;
}

#overlayRoot:not(.globalnav-open) #globalNavTitle {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.3px;
  color: #38bdf8;
  text-align: center;
}

#overlayRoot.globalnav-open #globalNavPanel {
  background: linear-gradient(145deg, #111827, #0f172a);
  border-radius: 16px;
  padding: 10px;
}

.globalNavBody {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  gap: 8px;
}

#globalSearchInput {
  width: 100%;
  box-sizing: border-box;
}

#globalResults {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

#globalNavPanel::after {
  background: #38bdf8;
}

#overlayRoot:not(.globalnav-open) #globalNavPanel::after {
  content: "";
  position: absolute;
  right: 0;
  top: 20%;
  bottom: 20%;
  width: 3px;
  border-radius: 2px;
  opacity: 0;
  transition: opacity 0.2s ease;
}

#overlayRoot:not(.globalnav-open) #globalNavPanel:hover::after {
  opacity: 1;
}

#overlayRoot:not(.globalnav-open) #globalNavPanel:hover {
  background: #1f2937;
  box-shadow: 0 0 0 1px rgba(56,189,248,0.35),
              0 6px 14px rgba(0,0,0,0.4);
  transform: translateX(-2px);
}


</style>
  </head>
